<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1200"
  height="280"
  viewBox="0 0 1200 280"
  role="img"
  aria-labelledby="title description"
>
  <title id="title">Jordan Chen</title>
  <desc id="description">
    Building products across trading, health, data, and AI.
  </desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#090D15" />
      <stop offset="55%" stop-color="#0D1320" />
      <stop offset="100%" stop-color="#111027" />
    </linearGradient>

    <radialGradient id="tealGlow">
      <stop offset="0%" stop-color="#2DD4BF" stop-opacity="0.34" />
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="purpleGlow">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.34" />
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2DD4BF" />
      <stop offset="48%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="280" rx="24" fill="url(#background)" />

  <circle cx="1040" cy="40" r="260" fill="url(#purpleGlow)" />
  <circle cx="110" cy="250" r="240" fill="url(#tealGlow)" />

  <g
    fill="none"
    stroke="url(#accent)"
    stroke-width="1.2"
    stroke-linecap="round"
    opacity="0.38"
  >
    <path d="M825 62 L920 32 L1000 86 L1102 46 L1160 112" />
    <path d="M825 62 L878 146 L1000 86 L1055 184 L1160 112" />
    <path d="M878 146 L950 225 L1055 184 L1140 245" />
    <path d="M1000 86 L1102 46 L1055 184" />
  </g>

  <g fill="#D8FAF5" filter="url(#glow)">
    <circle cx="825" cy="62" r="3" />
    <circle cx="920" cy="32" r="2.5" />
    <circle cx="1000" cy="86" r="4" />
    <circle cx="1102" cy="46" r="2.5" />
    <circle cx="1160" cy="112" r="3" />
    <circle cx="878" cy="146" r="3.5" />
    <circle cx="950" cy="225" r="2.5" />
    <circle cx="1055" cy="184" r="4" />
    <circle cx="1140" cy="245" r="3" />
  </g>

  <rect x="70" y="68" width="72" height="4" rx="2" fill="url(#accent)" />

  <text
    x="70"
    y="130"
    fill="#F4F7FC"
    font-family="Inter, Segoe UI, Arial, sans-serif"
    font-size="52"
    font-weight="700"
    letter-spacing="-1.5"
  >
    Jordan Chen
  </text>

  <text
    x="72"
    y="177"
    fill="#B9C2D2"
    font-family="Inter, Segoe UI, Arial, sans-serif"
    font-size="22"
    font-weight="400"
  >
    Building products across trading, health, data, and AI.
  </text>

  <text
    x="72"
    y="220"
    fill="#7890AD"
    font-family="Inter, Segoe UI, Arial, sans-serif"
    font-size="15"
    font-weight="600"
    letter-spacing="2"
  >
    MARKETS  ×  DATA  ×  HUMAN PERFORMANCE
  </text>
</svg>
