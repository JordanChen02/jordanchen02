<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1600"
  height="420"
  viewBox="0 0 1600 420"
  role="img"
  aria-labelledby="title description"
>
  <title id="title">Jordan Chen</title>
  <desc id="description">
    Building products across trading, health, data, and AI.
  </desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080D16"/>
      <stop offset="55%" stop-color="#0A101C"/>
      <stop offset="100%" stop-color="#0B1020"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#20D6C7"/>
      <stop offset="48%" stop-color="#2F8CFF"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>

    <linearGradient id="tealBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22E0D0"/>
      <stop offset="100%" stop-color="#3486FF"/>
    </linearGradient>

    <linearGradient id="bluePurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3486FF"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>

    <radialGradient id="rightAmbient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#254D91" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#32206B" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#050912" stop-opacity="0"/>
    </radialGradient>

    <pattern id="dotGrid" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1" fill="#7C91B2" opacity="0.09"/>
    </pattern>

    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="smallGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="panelClip">
      <rect x="1" y="1" width="1598" height="418" rx="30"/>
    </clipPath>
  </defs>

  <g clip-path="url(#panelClip)">
    <rect width="1600" height="420" fill="url(#background)"/>
    <rect width="1600" height="420" fill="url(#dotGrid)"/>
    <ellipse cx="1280" cy="205" rx="440" ry="300" fill="url(#rightAmbient)"/>

    <!-- Left content -->
    <rect x="74" y="77" width="190" height="5" rx="2.5" fill="url(#accent)"/>

    <text
      x="74"
      y="162"
      fill="#F5F7FC"
      font-family="Inter, Segoe UI, Arial, sans-serif"
      font-size="72"
      font-weight="650"
      letter-spacing="-2"
    >
      Jordan Chen
    </text>

    <text
      x="76"
      y="215"
      fill="#BCC5D5"
      font-family="Inter, Segoe UI, Arial, sans-serif"
      font-size="24"
      font-weight="500"
      letter-spacing="5"
    >
      BUILDING PRODUCTS ACROSS
    </text>

    <text
      x="76"
      y="258"
      font-family="Inter, Segoe UI, Arial, sans-serif"
      font-size="25"
      font-weight="650"
      letter-spacing="4"
    >
      <tspan fill="#27D7C8">TRADING</tspan>
      <tspan fill="#8390A7">, </tspan>
      <tspan fill="#31A2FF">HEALTH</tspan>
      <tspan fill="#8390A7">, </tspan>
      <tspan fill="#8B5CF6">DATA</tspan>
      <tspan fill="#8390A7">, AND AI.</tspan>
    </text>

    <!-- Markets icon -->
    <g transform="translate(78 312)" fill="none" stroke="#28D7C9" stroke-width="2">
      <path d="M2 35 L21 15 L34 28 L55 6"/>
      <path d="M44 6 H55 V17"/>
    </g>
    <text x="76" y="381" fill="#42DCCE" font-family="Inter, Segoe UI, Arial, sans-serif"
          font-size="15" font-weight="600" letter-spacing="3">MARKETS</text>

    <!-- Data icon -->
    <g transform="translate(292 312)" fill="none" stroke="#3D8FFF" stroke-width="2">
      <rect x="2" y="24" width="8" height="17"/>
      <rect x="18" y="14" width="8" height="27"/>
      <rect x="34" y="4" width="8" height="37"/>
    </g>
    <text x="286" y="381" fill="#5A9CFF" font-family="Inter, Segoe UI, Arial, sans-serif"
          font-size="15" font-weight="600" letter-spacing="3">DATA</text>

    <!-- Human performance icon -->
    <g transform="translate(470 307)" fill="none" stroke="#8B5CF6" stroke-width="2">
      <circle cx="24" cy="11" r="8"/>
      <path d="M8 48 V34 C8 24 15 19 24 19 C33 19 40 24 40 34 V48"/>
      <path d="M18 48 V36 M30 48 V36"/>
    </g>
    <text x="454" y="381" fill="#9B76FA" font-family="Inter, Segoe UI, Arial, sans-serif"
          font-size="15" font-weight="600" letter-spacing="3">HUMAN PERFORMANCE</text>

    <line x1="252" y1="312" x2="252" y2="378" stroke="#52617A" opacity="0.35"/>
    <line x1="421" y1="312" x2="421" y2="378" stroke="#52617A" opacity="0.35"/>

    <!-- Right-side layered systems illustration -->
    <g transform="translate(835 25)">
      <!-- vertical guide lines -->
      <g stroke="#294875" stroke-width="1" opacity="0.32">
        <path d="M158 64 V312"/>
        <path d="M305 36 V336"/>
        <path d="M460 77 V344"/>
        <path d="M615 38 V310"/>
      </g>

      <!-- upper plane -->
      <g fill="none" stroke-linejoin="round">
        <path d="M115 118 L352 16 L635 143 L396 249 Z"
              stroke="url(#tealBlue)" stroke-width="1.8" opacity="0.80"/>
        <path d="M146 134 L353 47 L599 156 L391 223 Z"
              stroke="#1AAFC9" stroke-width="1" opacity="0.28"/>
        <path d="M180 149 L353 78 L565 169 L389 199 Z"
              stroke="#2D89DE" stroke-width="1" opacity="0.22"/>
      </g>

      <!-- middle plane -->
      <g fill="none" stroke-linejoin="round">
        <path d="M72 222 L300 125 L595 253 L361 354 Z"
              stroke="url(#bluePurple)" stroke-width="1.8" opacity="0.82"/>
        <path d="M106 235 L301 154 L558 265 L360 329 Z"
              stroke="#347CF5" stroke-width="1" opacity="0.27"/>
        <path d="M143 249 L302 185 L522 278 L359 304 Z"
              stroke="#5F57E7" stroke-width="1" opacity="0.24"/>
      </g>

      <!-- lower plane -->
      <g fill="none" stroke-linejoin="round" opacity="0.70">
        <path d="M172 302 L345 230 L610 343 L433 408 Z"
              stroke="url(#bluePurple)" stroke-width="1.3"/>
        <path d="M216 319 L347 264 L566 356 L432 386 Z"
              stroke="#7158EA" stroke-width="0.9" opacity="0.45"/>
      </g>

      <!-- connections between planes -->
      <g fill="none" stroke-width="1.1" opacity="0.55">
        <path d="M115 118 V222" stroke="#27D8CB"/>
        <path d="M352 16 V125" stroke="#2FB8F0"/>
        <path d="M635 143 V253" stroke="#4E75FF"/>
        <path d="M396 249 V354" stroke="#635CE8"/>
        <path d="M300 125 V230" stroke="#3C8BFF"/>
        <path d="M595 253 V343" stroke="#7A5AEF"/>
        <path d="M361 354 V408" stroke="#5B6AF5"/>
      </g>

      <!-- chart line on upper plane -->
      <polyline
        points="150,142 190,127 224,132 263,105 297,115 330,83 356,91 385,63 408,77 447,44 486,53 524,28"
        fill="none"
        stroke="#23E2D3"
        stroke-width="3"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#softGlow)"
      />

      <!-- chart baseline ticks -->
      <g stroke="#2AA7D4" stroke-width="1" opacity="0.55">
        <path d="M147 166 H262"/>
        <path d="M147 173 H248"/>
        <path d="M147 180 H230"/>
        <path d="M147 187 H215"/>
      </g>

      <!-- lower bars -->
      <g fill="url(#bluePurple)" opacity="0.80">
        <rect x="455" y="300" width="8" height="39" rx="2"/>
        <rect x="472" y="282" width="8" height="57" rx="2"/>
        <rect x="489" y="293" width="8" height="46" rx="2"/>
        <rect x="506" y="263" width="8" height="76" rx="2"/>
        <rect x="523" y="276" width="8" height="63" rx="2"/>
        <rect x="540" y="244" width="8" height="95" rx="2"/>
      </g>

      <!-- small data marks -->
      <g fill="none" stroke="#37A3FF" stroke-width="1.3" opacity="0.72">
        <path d="M538 164 v-18 M548 164 v-26 M558 164 v-11 M568 164 v-34 M578 164 v-23"/>
        <path d="M246 286 h78 M246 293 h62 M246 300 h88 M246 307 h49"/>
      </g>

      <!-- nodes -->
      <g filter="url(#smallGlow)">
        <circle cx="115" cy="118" r="5" fill="#26DDCF"/>
        <circle cx="352" cy="16" r="5" fill="#28C6E9"/>
        <circle cx="635" cy="143" r="5" fill="#557BFF"/>
        <circle cx="396" cy="249" r="5" fill="#337FFF"/>
        <circle cx="72" cy="222" r="5" fill="#2FDACA"/>
        <circle cx="300" cy="125" r="5" fill="#28A5F1"/>
        <circle cx="595" cy="253" r="5" fill="#8B5CF6"/>
        <circle cx="361" cy="354" r="5" fill="#4D6DFA"/>
        <circle cx="172" cy="302" r="4.5" fill="#32C8E7"/>
        <circle cx="433" cy="408" r="4.5" fill="#6E5BEE"/>
        <circle cx="610" cy="343" r="4.5" fill="#8B5CF6"/>
      </g>

      <!-- floating micro nodes -->
      <g fill="#6E91CF">
        <circle cx="42" cy="331" r="2"/>
        <circle cx="87" cy="61" r="2"/>
        <circle cx="202" cy="36" r="2"/>
        <circle cx="526" cy="91" r="2"/>
        <circle cx="665" cy="75" r="2"/>
        <circle cx="657" cy="305" r="2"/>
      </g>
    </g>
  </g>

  <rect
    x="1"
    y="1"
    width="1598"
    height="418"
    rx="29"
    fill="none"
    stroke="#243044"
    stroke-width="2"
  />
</svg>
